name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v1.2.3)'
        required: true
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Auto-fix formatting with Prettier
        run: npm run format

      - name: Commit formatting fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git commit -am "chore: auto-fix formatting [skip ci]"
            # Move the tag to the new commit so the release points at the fixed source
            TAG="${{ github.event.inputs.tag_name || github.ref_name }}"
            git tag -f "$TAG"
            git push origin main
            git push origin "$TAG" --force
          fi

      - name: Validate code quality
        run: npm run validate

      - name: Build SCSS to CSS
        run: npm run build

      - name: Package chrome folder
        run: |
          zip -r firefox-chrome.zip chrome vendor customKeys.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            firefox-chrome.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
